version: '3.8'
services:
  backend:
    build: ./backend
    container_name: backend  # Konsisten
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CORS_ORIGIN=https://werecooked.my.id
      - MONGO_URI=mongodb://mongo:ylhJLGusxxhZcKarniyDYZyWwtFmxbxF@crossover.proxy.rlwy.net:50144
      - JWT_SECRET=5799f39d3045afe7aacdeac7e65888e53e1efb824b9c46a6c306dd5b71a89a488ada8049ec4c4736cb064877ea345c4c0b0449adad92e28124739351db7c2799
      - ML_API_BASE_URL=http://ml-service:5000  # Sesuaikan dengan nama container
    expose:
      - "3000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: frontend  # Konsisten
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - app-network

  ml-service:  # Ubah nama service
    build: ./machine-learning/collaborative-learning
    container_name: ml-service  # Sesuaikan dengan nginx config
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=production
      - FLASK_PORT=5000
    expose:
      - "5000"  # Port yang benar
    volumes:
      - ./machine-learning/collaborative-learning:/code
    networks:
      - app-network

  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy  # Konsisten
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
      - ml-service  # Sesuaikan nama
    networks:
      - app-network

networks:
  app-network:
    driver: bridge