version: '3.8'
services:
  backend:
    build: ./backend
    container_name: backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CORS_ORIGIN=https://werecooked.my.id,http://werecooked.my.id
      - MONGO_URI=mongodb://mongo:ylhJLGusxxhZcKarniyDYZyWwtFmxbxF@crossover.proxy.rlwy.net:50144
      - JWT_SECRET=5799f39d3045afe7aacdeac7e65888e53e1efb824b9c46a6c306dd5b71a89a488ada8049ec4c4736cb064877ea345c4c0b0449adad92e28124739351db7c2799
      - ML_API_BASE_URL=https://brohuy-recipes-recommendation-models.hf.space/
    expose:
      - "3000"
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - app-network

  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "8080:80"   # Internal nginx container
      - "8443:443"  # HTTPS port untuk container
    volumes:
    - ./nginx.conf:/etc/nginx/nginx.conf:ro
    # Mount dengan struktur file yang benar
    - /etc/letsencrypt/live/werecooked.my.id/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
    - /etc/letsencrypt/live/werecooked.my.id/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge