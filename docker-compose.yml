version: '3.8'

services:
  # Backend Service
  backend:
    build: ./backend
    container_name: collaborative-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CORS_ORIGIN=https://werecooked.my.id
      - MONGO_URI=mongodb://mongo:ylhJLGusxxhZcKarniyDYZyWwtFmxbxF@crossover.proxy.rlwy.net:50144
      - JWT_SECRET=5799f39d3045afe7aacdeac7e65888e53e1efb824b9c46a6c306dd5b71a89a488ada8049ec4c4736cb064877ea345c4c0b0449adad92e28124739351db7c2799
      - ML_API_BASE_URL=http://ml-service:5000
    expose:
      - "3000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - app-network

  # Frontend Service
  frontend:
    build: ./frontend
    container_name: collaborative-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - app-network

  # Machine Learning Service
  ml-service:
    build: ./machine-learning/collaborative-learning
    container_name: collaborative-ml
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=production
      - FLASK_PORT=5000
    expose:
      - "5000"
    volumes:
      - ./machine-learning/collaborative-learning:/code
    networks:
      - app-network

  # Nginx Proxy (Internal routing antar services)
  nginx-proxy:
    image: nginx:alpine
    container_name: collaborative-nginx-proxy
    restart: unless-stopped
    ports:
      - "8080:80"  # Exposed ke host system
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf  # Direct reference to root folder
      - ./conf.d:/etc/nginx/conf.d:ro       # Optional: if you have conf.d folder
    depends_on:
      - frontend
      - backend
      - ml-service
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local